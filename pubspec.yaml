name: news
description: "A new Flutter project."
publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  timeago: ^3.7.1
  flutter_svg: ^2.2.3
  shared_preferences: ^2.5.4
  intl: ^0.20.2
  provider: ^6.1.5+1
  http: ^1.6.0
  infinite_scroll_pagination: ^5.1.1
  url_launcher: ^6.3.2
  flutter_bloc: ^9.1.1
  flutter_dotenv: ^6.0.1
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.7

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
    - assets/icons/
    - .env
